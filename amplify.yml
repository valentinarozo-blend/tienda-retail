version: 1
frontend:
  phases:
    preBuild:
      commands:
        - sudo yum install -y docker
        - sudo dockerd &
        - sleep 5
        - sudo chmod 666 /var/run/docker.sock
        - docker --version
        - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 526156223487.dkr.ecr.us-east-1.amazonaws.com
        - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
        - aws ecr describe-repositories --repository-names tienda-retail --region us-east-1 2>/dev/null || aws ecr create-repository --repository-name tienda-retail --region us-east-1

    build:
      commands:
        - ECR_URI=526156223487.dkr.ecr.us-east-1.amazonaws.com/tienda-retail
        - IMAGE_TAG=$(date +%Y%m%d%H%M%S)
        - docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest .
        - docker push $ECR_URI:$IMAGE_TAG
        - docker push $ECR_URI:latest

    postBuild:
      commands:
        - SERVICE_ARN=$(aws apprunner list-services --region us-east-1 --query "ServiceSummaryList[?ServiceName=='tienda-retail-app'].ServiceArn" --output text)
        - SERVICE_STATUS=$(aws apprunner list-services --region us-east-1 --query "ServiceSummaryList[?ServiceName=='tienda-retail-app'].Status" --output text)
        - echo "ARN=$SERVICE_ARN STATUS=$SERVICE_STATUS"
        - |
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "Creando servicio nuevo..."
            aws apprunner create-service --service-name tienda-retail-app --region us-east-1 --source-configuration file://infra/apprunner_ecr_config.json --instance-configuration file://infra/apprunner_instance_config.json
          elif [ "$SERVICE_STATUS" = "RUNNING" ]; then
            echo "Desplegando en servicio existente..."
            aws apprunner start-deployment --service-arn $SERVICE_ARN --region us-east-1
          else
            echo "Servicio en estado $SERVICE_STATUS, eliminando y recreando..."
            aws apprunner delete-service --service-arn $SERVICE_ARN --region us-east-1
            sleep 90
            aws apprunner create-service --service-name tienda-retail-app --region us-east-1 --source-configuration file://infra/apprunner_ecr_config.json --instance-configuration file://infra/apprunner_instance_config.json
          fi

  artifacts:
    baseDirectory: .
    files:
      - "**/*"
