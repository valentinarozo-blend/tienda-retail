version: 1
frontend:
  phases:
    preBuild:
      commands:
        - sudo yum install -y docker
        - sudo dockerd &
        - sleep 5
        - sudo chmod 666 /var/run/docker.sock
        - docker --version
        - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 526156223487.dkr.ecr.us-east-1.amazonaws.com
        - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws || true
        - aws ecr describe-repositories --repository-names tienda-retail --region us-east-1 2>/dev/null || aws ecr create-repository --repository-name tienda-retail --region us-east-1

    build:
      commands:
        - ECR_URI=526156223487.dkr.ecr.us-east-1.amazonaws.com/tienda-retail
        - IMAGE_TAG=$(date +%Y%m%d%H%M%S)
        - docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest .
        - docker push $ECR_URI:$IMAGE_TAG
        - docker push $ECR_URI:latest

    postBuild:
      commands:
        # Registrar task definition
        - aws ecs register-task-definition --cli-input-json file://infra/ecs_task_definition.json --region us-east-1
        # Crear o actualizar servicio ECS
        - SERVICE_EXISTS=$(aws ecs describe-services --cluster tienda-retail --services tienda-retail-svc --region us-east-1 --query "services[?status=='ACTIVE'].serviceName" --output text)
        - |
          if [ -z "$SERVICE_EXISTS" ]; then
            echo "Creando servicio ECS..."
            aws ecs create-service \
              --cluster tienda-retail \
              --service-name tienda-retail-svc \
              --task-definition tienda-retail-task \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-06ea41d67cfbd0f82,subnet-0f3f30409934e562c],securityGroups=[sg-067ae256078c18fc1],assignPublicIp=ENABLED}" \
              --region us-east-1
          else
            echo "Actualizando servicio ECS..."
            aws ecs update-service \
              --cluster tienda-retail \
              --service tienda-retail-svc \
              --task-definition tienda-retail-task \
              --force-new-deployment \
              --region us-east-1
          fi

  artifacts:
    baseDirectory: .
    files:
      - "**/*"
