version: 0.2

# Este buildspec corre en CodeBuild con imagen "aws/codebuild/standard:7.0"
# y privileged mode = true (necesario para Docker)

phases:
  pre_build:
    commands:
      - echo "Login en ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - aws ecr describe-repositories --repository-names $ECR_REPO_NAME --region $AWS_REGION 2>/dev/null || aws ecr create-repository --repository-name $ECR_REPO_NAME --region $AWS_REGION
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME

  build:
    commands:
      - echo "Build Docker image..."
      - docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest .
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest

  post_build:
    commands:
      - echo "Deploy en App Runner..."
      - |
        SERVICE_ARN=$(aws apprunner list-services --region $AWS_REGION \
          --query "ServiceSummaryList[?ServiceName=='$APPRUNNER_SERVICE_NAME'].ServiceArn" \
          --output text)
      - |
        if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
          aws apprunner create-service \
            --service-name $APPRUNNER_SERVICE_NAME \
            --source-configuration "{
              \"ImageRepository\": {
                \"ImageIdentifier\": \"$ECR_URI:latest\",
                \"ImageConfiguration\": {
                  \"Port\": \"8501\",
                  \"RuntimeEnvironmentVariables\": {
                    \"AWS_REGION\": \"$AWS_REGION\",
                    \"COGNITO_USER_POOL_ID\": \"$COGNITO_USER_POOL_ID\",
                    \"COGNITO_APP_CLIENT_ID\": \"$COGNITO_APP_CLIENT_ID\",
                    \"DYNAMO_TABLE_PEDIDOS\": \"$DYNAMO_TABLE_PEDIDOS\",
                    \"DYNAMO_TABLE_PRODUCTOS\": \"$DYNAMO_TABLE_PRODUCTOS\",
                    \"S3_BUCKET_COMPROBANTES\": \"$S3_BUCKET_COMPROBANTES\"
                  }
                },
                \"ImageRepositoryType\": \"ECR\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"$APPRUNNER_ECR_ROLE_ARN\"
              }
            }" \
            --instance-configuration "{
              \"Cpu\": \"1 vCPU\",
              \"Memory\": \"2 GB\",
              \"InstanceRoleArn\": \"$APPRUNNER_INSTANCE_ROLE_ARN\"
            }" \
            --region $AWS_REGION
        else
          aws apprunner start-deployment --service-arn $SERVICE_ARN --region $AWS_REGION
        fi
      - echo "Deploy completado."
